<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="cw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Rounded square = blockchain block -->
  <rect width="120" height="120" rx="28" fill="url(#cw-grad)"/>
  <!-- Chain link + weekly cycle motif -->
  <g fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left chain loop -->
    <path d="M 48 38 L 40 38 A 10 10 0 0 0 40 58 L 48 58"/>
    <!-- Right chain loop -->
    <path d="M 72 38 L 80 38 A 10 10 0 0 1 80 58 L 72 58"/>
    <!-- Center connecting bar (forms chain) -->
    <line x1="48" y1="48" x2="72" y2="48"/>
    <!-- Weekly calendar grid below -->
    <line x1="35" y1="72" x2="85" y2="72"/>
    <line x1="35" y1="82" x2="85" y2="82"/>
    <line x1="43" y1="68" x2="43" y2="86"/>
    <line x1="60" y1="68" x2="60" y2="86"/>
    <line x1="77" y1="68" x2="77" y2="86"/>
  </g>
</svg>
